<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS selectors</title>
    <style>
        /* Element selector */
        div{
            /* background-color: red; */
        }
        /* class selector */
        .red{
            background-color: red;
        }
        /* id selector */
        #green{
            background-color: green;
        }
        /* child selector */
        div > p {
            color: blue;
            background-color: blanchedalmond;
        }
    </style>
</head>
<body>
    <div class="red">
        I am a div
        <p>I am para inside</p>
    </div>
    <div id="green">
        I am another div
    </div>
</body>
</html>
